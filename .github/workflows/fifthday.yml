name: Builder AUR
on:
  schedule:
    - cron: "0 0 */10 * *"
  workflow_dispatch:


jobs:
  AUR_CLANG:
    strategy:
      matrix:
        build: [
          postman-bin, paru, jamesdsp, swww, eww, pfetch,
          wf-config, matugen-bin, hyprshade, waypaper, wallust-git, app2unit-git, wl-screenrec-git,
          cava, sourcegit, windsurf, windsurf-next, swaylock-effects-git, wlr-randr-git, hyprprop-git, grimblast-git,
          flameshot-git, python-materialyoucolor, material-symbols-git
          ]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Build packages for arch
        uses: actions/checkout@v3.5.3
        with:
          repository: sarcasticadmin/empty-repo
      - id: makepkg
        uses: JPratama7/pkgbuild-action@original
        with:
          pkgdir: ${{ matrix.build }}
          makepkgArgs: "--skippgpcheck"
          clanged: "y"
          clangedPFlags: "y"
          officialRepo: "y"
          extraFlags: "-pthread"
          aurHelper: "yay"
          buildAurHelper: "y"
          chaoticAur: "y"
          ldflags: "-Wl,-z,nostart-stop-gc"
          rustcflags: "-C link-arg=-Wl,-z,nostart-stop-gc"
      - name: Ensure temp release exists
        id: check_temp
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/tags/temp")
          if [ "$status" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d '{"tag_name":"temp","name":"temp","draft":false,"prerelease":false}' \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload Artifact
        uses: ncipollo/release-action@v1.14.0
        with:
          allowUpdates: true
          tag: "temp"
          artifacts: "./*/*.zst"
          token: ${{ secrets.GITHUB_TOKEN }}

  AUR_GCC:
    strategy:
      matrix:
        build: [
          visual-studio-code-bin, visual-studio-code-insiders-bin,
          appimagelauncher, podman-desktop, zed-git, yay
          ]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Build packages for arch
        uses: actions/checkout@v3.5.3
        with:
          repository: sarcasticadmin/empty-repo
      - id: makepkg
        uses: JPratama7/pkgbuild-action@original
        with:
          maxJobs: "99"
          gccPflags: "y"
          chaoticAur: "y"
          aurHelper: "yay"
          buildAurHelper: "y"
          pkgdir: ${{ matrix.build }}
          makepkgArgs: "--skippgpcheck"
      - name: Ensure temp release exists
        id: check_temp
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/tags/temp")
          if [ "$status" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d '{"tag_name":"temp","name":"temp","draft":false,"prerelease":false}' \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload Artifact
        uses: ncipollo/release-action@v1.14.0
        with:
          allowUpdates: true
          replacesArtifacts: true
          tag: "temp"
          artifacts: "*/*.zst"
          token: ${{ secrets.GITHUB_TOKEN }}

  TRIGGER_PUBLISH:
    if: ${{ always() }}
    needs: [AUR_CLANG, AUR_GCC]
    runs-on: ubuntu-latest
    steps:
      - name: Invoke workflow without inputs
        uses: benc-uk/workflow-dispatch@v1.2.2
        with:
          workflow: Create DB
